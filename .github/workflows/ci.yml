name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: energy_platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d energy_platform_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_ENV: development
      APP_NAME: EnergyInferencePlatform
      APP_VERSION: 0.1.0
      APP_SECRET_KEY: change-this-app-secret-with-at-least-32-characters
      DEBUG: "false"

      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/energy_platform_test
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/energy_platform_test
      DATABASE_POOL_SIZE: "20"
      DATABASE_MAX_OVERFLOW: "40"
      DATABASE_POOL_TIMEOUT: "30"

      REDIS_URL: redis://localhost:6379/0
      REDIS_CACHE_DB: "1"
      REDIS_CELERY_DB: "2"
      REDIS_CACHE_TTL: "3600"

      CELERY_BROKER_URL: redis://localhost:6379/2
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      CELERY_TASK_SOFT_TIME_LIMIT: "300"
      CELERY_TASK_TIME_LIMIT: "600"

      JWT_SECRET_KEY: change-this-jwt-secret-with-at-least-32-characters
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "480"
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"

      NASA_POWER_BASE_URL: https://power.larc.nasa.gov/api/temporal/hourly/point
      PVGIS_BASE_URL: https://re.jrc.ec.europa.eu/api/v5_2
      INMET_BASE_URL: https://apitempo.inmet.gov.br
      INMET_API_TOKEN: ""

      ML_MODEL_BASE_PATH: /tmp/models
      YOLO_MODEL_PATH: /tmp/models/fv_detector.pt
      YOLO_CONFIDENCE_THRESHOLD: "0.45"
      YOLO_IOU_THRESHOLD: "0.5"
      YOLO_MAX_IMAGE_SIZE_MB: "20"
      IMAGE_GSD_DEFAULT: "0.15"

      KWP_FACTOR_DEFAULT: "0.18"
      PERFORMANCE_RATIO_DEFAULT: "0.78"
      PANEL_EFFICIENCY_DEFAULT: "0.20"

      PROMETHEUS_ENABLED: "false"
      LOG_LEVEL: INFO
      LOG_FORMAT: json

      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry

      - name: Configure Poetry
        run: |
          poetry config virtualenvs.create false

      - name: Install project dependencies
        run: |
          poetry install --no-interaction --no-root

      - name: Compile Python files
        run: |
          python -m compileall backend ml_engine tests

      - name: Run Ruff
        run: |
          python -m ruff check backend ml_engine tests

      - name: Run tests with coverage
        run: |
          python -m pytest --cov=backend --cov=ml_engine --cov-report=xml --cov-report=term

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: error